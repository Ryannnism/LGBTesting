name: UAT Build & Deploy

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy to Lightsail UAT after build
        type: boolean
        default: false
  push:
    branches: [uat]

concurrency:
  group: uat-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
      - run: dotnet test LGBApp.Backend.Tests/LGBApp.Backend.Tests.csproj -c Release --verbosity normal

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: LGBApp.Frontend/package-lock.json

      - name: Build release
        run: |
          chmod +x scripts/*.sh
          ./scripts/package-release.sh

      - name: Upload UAT artifact
        uses: actions/upload-artifact@v4
        with:
          name: lgbapp-uat-release
          path: out/lgbapp-release.zip
          retention-days: 30

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: >-
      github.event_name == 'push'
      || (github.event_name == 'workflow_dispatch' && inputs.deploy)
    environment: uat
    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: lgbapp-uat-release

      - name: Deploy to Lightsail
        env:
          SSH_HOST: ${{ secrets.UAT_SSH_HOST }}
          SSH_USER: ${{ secrets.UAT_SSH_USER }}
          SSH_KEY: ${{ secrets.UAT_SSH_PRIVATE_KEY }}
        run: |
          if [[ -z "$SSH_HOST" || -z "$SSH_USER" || -z "$SSH_KEY" ]]; then
            echo "Missing UAT_SSH_HOST, UAT_SSH_USER, or UAT_SSH_PRIVATE_KEY secrets." >&2
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/uat_key
          chmod 600 ~/.ssh/uat_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          scp -i ~/.ssh/uat_key -o StrictHostKeyChecking=accept-new \
            lgbapp-release.zip "${SSH_USER}@${SSH_HOST}:/tmp/lgbapp-release.zip"
          ssh -i ~/.ssh/uat_key -o StrictHostKeyChecking=accept-new \
            "${SSH_USER}@${SSH_HOST}" \
            'sudo bash /var/www/lgbapp/scripts/deploy-lightsail-remote.sh /tmp/lgbapp-release.zip'
